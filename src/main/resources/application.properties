# ===================================
# Application Configuration
# ===================================
spring.application.name=finance-dashboard

# ===================================
# H2 In-Memory Database (Default)
# ===================================
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================
# MySQL Configuration (Uncomment for Production)
# ===================================
# spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For MySQL use: org.hibernate.dialect.MySQLDialect

# ===================================
# JWT Configuration
# ===================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ===================================
# Server Configuration
# ===================================
server.port=8082

# ===================================
# Logging
# ===================================
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=INFO
